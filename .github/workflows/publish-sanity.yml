name: Publish sanity

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
      - '.github/workflows/publish-sanity.yml'

concurrency:
  group: publish-sanity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: publint + arethetypeswrong (${{ matrix.package }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        package:
          - packages/core
          - packages/react
          - packages/privy-adapter
          - packages/stellar-wallets-kit-adapter
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: publint
        run: npx -y publint ${{ matrix.package }}

      - name: Are the types wrong
        working-directory: ${{ matrix.package }}
        run: npx -y @arethetypeswrong/cli@latest --pack
